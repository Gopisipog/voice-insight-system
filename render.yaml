services:
  # Backend API server (Python FastAPI + Whisper)
  - type: web
    name: voice-insight-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: SERVER_PORT
        value: 10000
